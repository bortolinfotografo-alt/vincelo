# ============================================================
# Deploy — Build e push de imagens Docker para o registry
# Roda apenas em push para main (após CI passar)
#
# Configure os secrets no GitHub:
#   DOCKER_USERNAME  → usuário Docker Hub (ou registry)
#   DOCKER_PASSWORD  → token de acesso Docker Hub
#   SERVER_HOST      → IP/hostname do servidor de produção
#   SERVER_USER      → usuário SSH
#   SERVER_SSH_KEY   → chave privada SSH (PEM)
# ============================================================

name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    # Só roda se o CI passou
    needs: []

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/vincelo-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/vincelo-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/vincelo-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/vincelo-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/vincelo
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose exec -T backend npx prisma migrate deploy
            docker image prune -f
            echo "Deploy concluído: $(date)"
