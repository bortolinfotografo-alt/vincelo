# ============================================================
# CI — Integração Contínua
# Roda em todo push e pull_request para main/master
#
# Etapas:
#   lint     → ESLint no frontend
#   build    → build de produção do Next.js
#   backend  → valida que o servidor inicia sem erro
# ============================================================

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:

  # ── Frontend: lint + build ──────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api

  # ── Backend: geração do Prisma client + startup check ───────
  backend:
    name: Backend — Prisma Generate & Startup
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vincelo_test
          POSTGRES_PASSWORD: vincelo_test
          POSTGRES_DB: vincelo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://vincelo_test:vincelo_test@localhost:5432/vincelo_test

      - name: Run Prisma Migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://vincelo_test:vincelo_test@localhost:5432/vincelo_test

      - name: Validate server startup
        run: |
          timeout 15 node -e "
            process.env.DATABASE_URL='postgresql://vincelo_test:vincelo_test@localhost:5432/vincelo_test';
            process.env.JWT_SECRET='ci-test-secret-key-32chars-minimum';
            process.env.JWT_REFRESH_SECRET='ci-test-refresh-secret-32chars';
            process.env.NODE_ENV='test';
            process.env.PORT='3099';
            require('./src/server');
          " && echo 'Server started OK'
        env:
          DATABASE_URL: postgresql://vincelo_test:vincelo_test@localhost:5432/vincelo_test
